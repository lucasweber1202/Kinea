name: Format centralization branch

on:
  push:
    branches:
      - integration/centralize-main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/centralize-main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install formatter
        run: python -m pip install ruff==0.15.22
      - name: Apply Ruff fixes and formatting
        run: |
          python -m ruff check --fix \
            kinea/collector.py \
            kinea/features.py \
            kinea/health.py \
            kinea/locking.py \
            kinea/vintages.py \
            tests/test_hardening.py
          python -m ruff format \
            kinea/collector.py \
            kinea/features.py \
            kinea/health.py \
            kinea/locking.py \
            kinea/vintages.py \
            tests/test_hardening.py
      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kinea tests/test_hardening.py
          git commit -m "Format consolidated hardening changes"
          git push origin HEAD:integration/centralize-main
