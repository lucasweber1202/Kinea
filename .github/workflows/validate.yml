name: Validate delivery

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pinned dependencies
        run: python -m pip install -e ".[dev,dashboard]"
      - name: Run tests
        run: python -m pytest -q
      - name: Validate committed evidence
        run: python scripts/validate_delivery.py
      - name: Smoke-test all dashboard sections
        run: |
          python - <<'PY'
          from streamlit.testing.v1 import AppTest

          app = AppTest.from_file("dashboard/app.py")
          app.run(timeout=30)
          assert not app.exception
          assert [tab.label for tab in app.tabs] == [
              "Overview", "HICP components", "EUR/CZK",
              "Vintages", "As-of", "Audit",
          ]
          PY
