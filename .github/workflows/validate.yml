name: Validate delivery

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install pinned dependencies
        run: python -m pip install -e ".[dev,dashboard,modeling]"
      - name: Check formatting and lint
        run: |
          python -m ruff format --check .
          python -m ruff check .
      - name: Check types
        run: python -m mypy
      - name: Run tests, including the dashboard contract and coverage gate
        run: python -m pytest -q
      - name: Validate committed evidence
        run: python scripts/validate_delivery.py
