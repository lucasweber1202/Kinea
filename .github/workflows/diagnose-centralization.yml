name: Diagnose centralization

on:
  push:
    branches:
      - integration/centralize-main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev,dashboard,modeling]"
      - name: Capture pytest output
        run: |
          set +e
          python -m pytest -q > pytest-output.txt 2>&1
          echo "$?" > pytest-exit.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: centralization-pytest-output
          path: |
            pytest-output.txt
            pytest-exit.txt
